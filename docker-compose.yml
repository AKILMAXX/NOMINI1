version: '3.9'

services:
  nomini:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY}
        GEMINI_API_KEY: ${GEMINI_API_KEY}
    image: nomini:latest
    container_name: nomini-app
    ports:
      - "80:80"
    restart: unless-stopped
    environment:
      - NODE_ENV=production
